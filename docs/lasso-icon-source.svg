<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6CC5F0"/>
      <stop offset="60%" stop-color="#4373D9"/>
      <stop offset="100%" stop-color="#1E3F8C"/>
    </linearGradient>
    <filter id="lassoShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="rgba(20,40,80,0.45)"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with macOS-style corner radius (~22%) -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>

  <!-- Soft top highlight -->
  <rect x="0" y="0" width="1024" height="512" rx="225" ry="225"
        fill="rgba(255,255,255,0.07)"/>

  <g filter="url(#lassoShadow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Lasso loop (slight tilt) -->
    <ellipse cx="525" cy="395" rx="260" ry="170"
             stroke="#FFFFFF" stroke-width="44"
             transform="rotate(-12 525 395)"/>

    <!-- Rope tail trailing down-left to mimic a lasso held in hand -->
    <path d="M 305 525 C 290 620, 280 720, 255 815"
          stroke="#FFFFFF" stroke-width="44"/>

    <!-- Knot where rope meets loop -->
    <circle cx="305" cy="525" r="28" fill="#FFFFFF"/>
  </g>
</svg>
